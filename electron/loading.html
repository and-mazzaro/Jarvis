<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Jarvis — Starting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050810;
      color: #f0f4ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      -webkit-app-region: drag;
    }
    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 10px;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .dots { display: flex; gap: 10px; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #00d4ff;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; background: #7b2fff; }
    .dot:nth-child(3) { animation-delay: 0.30s; background: #ff6b35; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.5); opacity: 0.4; }
      40%          { transform: scale(1);   opacity: 1;   }
    }
    .msg {
      font-size: 12px;
      letter-spacing: 3px;
      color: #445566;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo">JARVIS</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="msg" id="msg">Starting backend…</div>
  <script>
    const msgs = [
      'Starting backend…',
      'Connessione a DeepSeek V4 Flash…',
      'Loading models…',
      'Connecting…',
      'Almost ready…',
    ];
    let i = 1;
    const el = document.getElementById('msg');
    setInterval(() => { el.textContent = msgs[i++ % msgs.length]; }, 1800);
  </script>
</body>
</html>
